<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeri Koleksi - Perpustakaan Mikroskil</title>
    <link rel="stylesheet" href="css/style-user.css" />
</head>

<body>
    <div class="bg-header-galeri">
        <header class="navbar">
            <div class="navbar-inner">
                <a href="index.html" class="logo">
                    <img src="src/logo mikro putih.webp" alt="Logo Mikro" />
                </a>
                <input type="checkbox" id="navToggle" class="nav-toggle" />
                <label for="navToggle" class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <nav>
                    <ul class="nav-menu">
                        <li class="judul-nav">MENU</li>
                        <li><a href="#" id="themeToggle">🌙 Dark Mode</a></li>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="user-galeri.html" class="active">Galeri</a></li>
                        <li><a href="user-contact.html">Contact Us</a></li>
                        <li class="admin-menu"><a href="admin-login.html">Login Admin</a></li>
                    </ul>
                </nav>
                <div class="nav-overlay"></div>
            </div>
            <div class="header-content">
                <h1>KOLEKSI BUKU</h1>
            </div>
            <div class="user-controls">
                <div class="search" id="SearchInput">
                    <input type="text" placeholder="e.g. Library and Information" />
                    <button id="SearchButton">Cari</button>
                </div>
                <div class="advanced-btn">
                    <a href="#" id="openAdvancedSearch">Advanced Search</a>
                </div>
            </div>
        </header>
    </div>
    <main class="galeri-container">
        <div class="book-grid" id="bookGridUser"></div>
    </main>
    <footer>
        <p>&copy; 2026 Katalog - Perpustakaan Mikroskil</p>
    </footer>
    <form id="advancedModal" class="advanced-modal">
        <div class="advanced-content">
            <button type="button" class="close-advanced">&times;</button>
            <h2>🔍 Advanced Search</h2>
            <div class="advanced-form">
                <div class="form-group">
                    <label>Judul Buku</label>
                    <input type="text" id="filterTitle" placeholder="e.g. Pemrograman Web">
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="filterCategory">
                        <option value="" selected>Semua Kategori</option>
                        <option value="Fiction">Fiction</option>
                        <option value="Kps">Kps</option>
                        <option value="Reference">Reference</option>
                        <option value="Textbook">Textbook</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pengarang</label>
                    <input type="text" id="filterAuthor" placeholder="e.g. Ucok Baba">
                </div>

                <div class="form-group">
                    <label>Penerbit</label>
                    <input type="text" id="filterPublisher" placeholder="e.g. Grandmedia">
                </div>

                <div class="form-group">
                    <label>Tahun Terbit</label>
                    <input type="text" id="filterYear" maxlength="4" placeholder="e.g. 2024">
                </div>
                <button type="submit" id="btnAdvancedSearch" class="btn-search">
                    Cari Buku
                </button>
            </div>
        </div>
    </form>
    <script src="js/script.js"></script>
</body>

</html>
