<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katalog Perpustakaan</title>
  <link rel="stylesheet" href="css/style-admin.css" />
</head>

<body>
  <div class="container">
    <input type="checkbox" id="navToggle" class="nav-toggle" />
    <aside class="sidebar">
      <div class="logo">
        <a href="admin-home.html">
          <img src="src/logo mikro biru.webp" alt="Logo Mikro" />
        </a>
      </div>
      <nav class="nav-menu">
        <ul>
          <li>
            <a href="#" id="themeToggle">
              <span>🌙</span> Dark Mode
            </a>
          </li>
          <li>
            <a href="admin-home.html">
              <span>🏠</span> Dashboard
            </a>
          </li>
          <li>
            <a href="admin-galeri.html">
              <span>🖼️</span> Galeri
            </a>
          </li>
          <li>
            <a href="admin-message.html" class="active">
              <span>💬</span> Message
              <span id="messageBadge" class="message-badge">0</span>
            </a>
          </li>
          <li>
            <a href="index.html">
              <span>🚪</span> Logout
            </a>
          </li>
        </ul>
      </nav>
    </aside>
    <div class="main-content">
      <header class="topbar">
        <h1>Message</h1>
        <label for="navToggle" class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </label>
      </header>
      <main>
        <div class="gallery-header">
          <h2>Pesan Masuk User</h2>
          <p>Daftar pesan yang dikirim oleh User </p>
        </div>
        <div class="gallery-controls">
          <input type="text" id="searchMessageInput" placeholder="Cari nama pengirim..." />
          <select id="filterStatus">
            <option value="">Semua Pesan</option>
            <option value="Belum Dibaca">Belum Dibaca</option>
            <option value="Sudah Dibaca">Sudah Dibaca</option>
          </select>
        </div>
        <div class="card table-container">
          <table class="message-table">
            <thead>
              <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Subjek</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="messageTableBody"></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>
  <div id="messagePopup" class="message-popup">
    <div class="message-popup-content">
      <button id="closeMessagePopup" class="close-btn">
        &times;
      </button>
      <h2>Detail Pesan</h2>
      <div class="message-detail-card">
        <div class="message-header">
          <div class="message-avatar" id="detailAvatar"></div>
          <div class="message-header-info">
            <h3 id="detailNama"></h3>
            <p id="detailEmail"></p>
          </div>
        </div>
        <div class="message-meta">
          <div class="meta-item">
            <span>📌 Subjek</span>
            <strong id="detailSubjek"></strong>
          </div>
          <div class="meta-item">
            <span>📅 Tanggal</span>
            <strong id="detailTanggal"></strong>
          </div>
        </div>
        <div class="message-content">
          <h4>Isi Pesan</h4>
          <p id="detailPesan"></p>
        </div>
      </div>
    </div>
  </div>
  <script src="js/script.js"></script>
</body>

</html>
